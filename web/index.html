<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1><i class="fa-solid fa-book-open"></i> Notes</h1>
        </header>

        <main>
            <section class="add-note-section">
                <form id="note-form" class="glass-panel">
                    <input type="hidden" id="note-id">
                    <div class="form-group">
                        <input type="text" id="note-title" placeholder="Note Title" required>
                    </div>
                    <div class="form-group">
                        <textarea id="note-content" placeholder="Write your note here..." rows="4" required></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="submit-btn" class="btn primary-btn"><i class="fa-solid fa-plus"></i> Add Note</button>
                        <button type="button" id="cancel-edit-btn" class="btn secondary-btn hidden"><i class="fa-solid fa-xmark"></i> Cancel</button>
                    </div>
                </form>
            </section>

            <section class="notes-grid" id="notes-container">
                <!-- Notes will be inserted here dynamically -->
                <div class="loading-spinner"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading notes...</div>
            </section>
        </main>
    </div>

    <!-- Template for a note card -->
    <template id="note-card-template">
        <div class="note-card glass-panel" data-id="">
            <div class="note-header">
                <h3 class="note-title"></h3>
                <div class="note-actions">
                    <button class="icon-btn edit-btn" title="Edit Note"><i class="fa-solid fa-pen"></i></button>
                    <button class="icon-btn delete-btn" title="Delete Note"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </div>
            <div class="note-body">
                <p class="note-content"></p>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
